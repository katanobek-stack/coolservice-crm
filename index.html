function makeMicBtn(textarea){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  var btn=h("button",{s:{padding:"8px 14px",borderRadius:"8px",border:"1px solid rgba(239,68,68,.25)",background:"rgba(239,68,68,.05)",color:"#f87171",fontSize:"12px",fontWeight:"600",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:"4px",marginTop:"6px",transition:"all .2s"}});
  btn.textContent="🎙 Голос";
  var recording=false;
  var recognition=null;
  btn.addEventListener("click",function(){
    if(recording){
      if(recognition)recognition.stop();
      return;
    }
    recognition=new SR();
    recognition.lang="ru-RU";
    recognition.continuous=false;
    recognition.interimResults=false;
    recording=true;
    btn.textContent="🔴 Говорите...";
    btn.style.borderColor="rgba(239,68,68,.6)";
    btn.style.background="rgba(239,68,68,.15)";
    btn.style.animation="notif-pulse 1s infinite";
    recognition.onresult=function(e){
      var text="";
      for(var i=0;i<e.results.length;i++){
        text+=e.results[i][0].transcript;
      }
      if(text){
        var cur=textarea.value;
        textarea.value=cur+(cur?" ":"")+text;
      }
    };
    recognition.onerror=function(){stopRec()};
    recognition.onend=function(){stopRec()};
    recognition.start();
    function stopRec(){
      recording=false;
      btn.textContent="🎙 Голос";
      btn.style.borderColor="rgba(239,68,68,.25)";
      btn.style.background="rgba(239,68,68,.05)";
      btn.style.animation="none";
      recognition=null;
    }
  });
  return btn;
}

// Multi-assignee helpers
function getAssignees(t){if(t.assignees&&t.assignees.length)return t.assignees;if(t.assignee)return[t.assignee];return[]}
function getDoneBy(t){return t.doneBy||[]}
function tSt(t){
  var a=getAssignees(t);
  // Multi-assignee: use doneBy array
  if(a.length>1){
    var d=getDoneBy(t);
    return a.every(function(uid){return d.indexOf(uid)>=0})?"done":"in_progress";
  }
  // Single assignee or legacy: use status
  if(t.status==="done")return"done";
  var d2=getDoneBy(t);
  if(a.length===1&&d2.length&&d2.indexOf(a[0])>=0)return"done";
  return t.status||"in_progress";
}

function toggleTask(cid,rid,tid,isDone){
  var uid=S.u.uid;
  var cl=S.cl.find(function(c){return c.id===cid});if(!cl)return;
  var rp=(cl.repairs||[]).slice();var ri=rp.findIndex(function(r){return r.id===rid});if(ri<0)return;
  var ts=(rp[ri].tasks||[]).slice();var ti=ts.findIndex(function(x){return x.id===tid});if(ti<0)return;
  var task=ts[ti];
  if(task.assignees&&task.assignees.length){
    // Multi-assignee: toggle current user in doneBy
    var doneBy=(task.doneBy||[]).slice();
    var idx=doneBy.indexOf(uid);
    if(isDone){
      // Remove from doneBy if reverting
      if(idx>=0)doneBy.splice(idx,1);
    }else{
      if(idx<0)doneBy.push(uid);
    }
    var allDone=task.assignees.every(function(u){return doneBy.indexOf(u)>=0});
    ts[ti]=Object.assign({},task,{doneBy:doneBy,status:allDone?"done":"in_progress"});
  }else{
    // Legacy single assignee
    ts[ti]=Object.assign({},task,{status:isDone?"in_progress":"done"});
  }
  rp[ri]=Object.assign({},rp[ri],{tasks:ts});fbArr(cid,"repairs",rp);
}

// ═══ MY TASKS TAB ═══
function myTasksTab(ct){
  var uid=S.u.uid;
  var isAdmin=myRole()==="admin"||myRole()==="manager";
  var hasAnything=false;

  // ═══ MY PERSONAL TASKS (service tasks + projects) ═══
  var myActiveSvc=S.tasks.filter(function(t){return isMyTask(t)&&tSt(t)!=="done"});
  if(myActiveSvc.length){
    hasAnything=true;
    secTitle(ct,"📝 Мои задачи и проекты ("+myActiveSvc.length+")");
    myActiveSvc.forEach(function(t){ct.appendChild(buildTaskCard(Object.assign({},t,{type:t.taskType||"task"})))});
  }

  // ═══ MY REPAIR TASKS (active, assigned to me) — grouped by vehicle ═══
  var myRepairTasks=[];
  S.cl.forEach(function(c){(c.repairs||[]).forEach(function(r){
    if(rSt(r)==="cancelled")return;
    var myTasks=(r.tasks||[]).filter(function(t){return isMyTask(t)&&tSt(t)!=="done"});
    if(myTasks.length){
      myRepairTasks.push({cid:c.id,cn:c.name,r:r,tasks:myTasks,v:(c.vehicles||[]).find(function(x){return x.id===r.vehicleId})});
    }
  })});
  if(myRepairTasks.length){
    hasAnything=true;
    var totalMyTasks=myRepairTasks.reduce(function(s,i){return s+i.tasks.length},0);
    secTitle(ct,"🔧 Мои ремонты ("+totalMyTasks+" задач)");
    myRepairTasks.forEach(function(item){renderVehicleTaskGroup(ct,item)});
  }

  // ═══ ALL STAFF TASKS (admin/manager only) — grouped by person → vehicle ═══
  if(isAdmin){
    var otherByPerson={};
    S.cl.forEach(function(c){(c.repairs||[]).forEach(function(r){
      if(rSt(r)==="cancelled")return;
      var v=(c.vehicles||[]).find(function(x){return x.id===r.vehicleId});
      (r.tasks||[]).forEach(function(t){
        var assignees=getAssignees(t);
        var doneBy=getDoneBy(t);
        // For each assignee who hasn't finished yet, show the task under their name
        assignees.forEach(function(auid){
          if(auid===uid)return; // skip self (shown in "my tasks")
          var thisDone=doneBy.indexOf(auid)>=0;
          if(thisDone&&tSt(t)==="done")return; // fully done
          if(!otherByPerson[auid])otherByPerson[auid]={};
          var rkey=c.id+"_"+r.id;
          if(!otherByPerson[auid][rkey])otherByPerson[auid][rkey]={cid:c.id,cn:c.name,r:r,v:v,tasks:[]};
          // Avoid duplicates
          var exists=otherByPerson[auid][rkey].tasks.some(function(x){return x.id===t.id});
          if(!exists)otherByPerson[auid][rkey].tasks.push(t);
        });
      });
    })});
    var otherSvcByPerson={};
    S.tasks.forEach(function(t){
      if(tSt(t)==="done")return;
      getAssignees(t).forEach(function(auid){
        if(auid===uid)return;
        if(!otherSvcByPerson[auid])otherSvcByPerson[auid]=[];
        otherSvcByPerson[auid].push(t);
      });
    });

    var allPersonKeys=[];
    Object.keys(otherByPerson).forEach(function(k){if(allPersonKeys.indexOf(k)<0)allPersonKeys.push(k)});
    Object.keys(otherSvcByPerson).forEach(function(k){if(allPersonKeys.indexOf(k)<0)allPersonKeys.push(k)});

    if(allPersonKeys.length){
      hasAnything=true;
      secTitle(ct,"👥 Задачи сотрудников");
      allPersonKeys.forEach(function(puid){
        var name=sN(puid);
        var repairs=otherByPerson[puid]?Object.values(otherByPerson[puid]):[];
        var svcTasks2=otherSvcByPerson[puid]||[];
        var totalCount=repairs.reduce(function(s,i){return s+i.tasks.length},0)+svcTasks2.length;

        // Collapsible person header
        var pExp=false;
        var pCont=h("div",{s:{display:"none"}});
        var pArrow=h("span",{s:{transition:"transform .2s",display:"inline-block",fontSize:"10px"}},"▶");
        var pHdr=h("div",{s:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",background:"rgba(139,92,246,.06)",borderRadius:"10px",border:"1px solid rgba(139,92,246,.12)",marginTop:"6px",marginBottom:"4px",cursor:"pointer"},onClick:function(){
          pExp=!pExp;pCont.style.display=pExp?"block":"none";pArrow.style.transform=pExp?"rotate(90deg)":"rotate(0deg)";
        }});
        pHdr.append(pArrow,h("span",{s:{fontSize:"13px",fontWeight:"600",color:"#a78bfa"}},"👤 "+name+" — "+totalCount+" задач"));
        ct.appendChild(pHdr);
        repairs.forEach(function(item){renderVehicleTaskGroup(pCont,item)});
        svcTasks2.forEach(function(t){pCont.appendChild(buildTaskCard(Object.assign({},t,{type:t.taskType||"task"})))});
        ct.appendChild(pCont);
      });
    }
  }

  if(!hasAnything){
    ct.appendChild(h("div",{s:{textAlign:"center",padding:"40px"}},h("div",{s:{fontSize:"36px",marginBottom:"12px"}},"📋"),h("div",{s:{fontSize:"15px",fontWeight:"600",color:"#64748b"}},"Нет задач")));
  }
}

// Render vehicle header + task list grouped under it
function renderVehicleTaskGroup(ct,item){
  var card=h("div",{cls:"rc"});
  // Vehicle header (once)
  var vHdr=h("div",{s:{marginBottom:"6px",cursor:"pointer"},onClick:function(){S.sel=item.cid;R()}});
  if(item.v&&item.v.brand)vHdr.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9"}},item.v.brand));
  if(item.v)vHdr.appendChild(plate(item.v.plate||""));
  vHdr.appendChild(h("div",{s:{fontSize:"11px",color:"#64748b",marginTop:"2px"}},item.cn+(item.r.date?" · "+fD(item.r.date):"")));
  card.appendChild(vHdr);
  // Task list
  item.tasks.forEach(function(t,idx){
    var taskData={id:t.id,description:t.description,status:t.status,photos:t.photos,rid:item.r.id,cid:item.cid||item.cid,cn:item.cn,v:item.v,rd:item.r.date,type:"repair",freonTask:t.freonTask||false,freonKg:t.freonKg||"",workComment:t.workComment||"",assignees:t.assignees,assignee:t.assignee,doneBy:t.doneBy};
    var tCard=buildTaskCardCompact(taskData,idx+1);
    card.appendChild(tCard);
  });
  ct.appendChild(card);
}

function buildTaskCard(t){
  var cd=h("div",{cls:"rc"});
  var tp=h("div",{s:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}});
  var left=h("div",{s:{cursor:"pointer"},onClick:function(){if(t.cid){S.sel=t.cid;R()}}});
  // For repair tasks: show vehicle info first, then client name small
  if(t.type==="repair"&&t.v){
    if(t.v.brand)left.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9"}},t.v.brand));
    left.appendChild(plate(t.v.plate||""));
    if(t.cn)left.appendChild(h("div",{s:{fontSize:"11px",color:"#64748b",marginTop:"2px"}},t.cn));
  }else if(t.cn){
    left.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9"}},t.cn));
  }
  if(t.title)left.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9"}},t.title));
  var typeBadge=t.type==="project"?badge("📐 Проект","245,158,11"):t.type==="task"?badge("📝 Задача","99,102,241"):null;
  if(typeBadge)left.appendChild(typeBadge);
  tp.appendChild(left);
  var isDone=t.status==="done";

  // Status button — freon tasks have different behavior
  if(t.freonTask&&t.type==="repair"){
    // Freon task: show status badge, no instant toggle
    var frBadge=h("span",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",background:isDone?"rgba(34,197,94,.15)":"rgba(6,182,212,.15)",color:isDone?"#4ade80":"#22d3ee"}},isDone?"✅ Готово":"🧊 Фреон");
    tp.appendChild(frBadge);
  }else{
    // Regular tasks: toggle on click
    var statusBtn;
    if(t.type==="repair"){
      statusBtn=h("button",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"none",background:isDone?"rgba(34,197,94,.15)":"rgba(249,115,22,.15)",color:isDone?"#4ade80":"#fb923c"},onClick:function(){toggleMultiTask(t,t.cid,t.rid,t.id)}},isDone?"✅":"🔧");
    }else{
      statusBtn=h("button",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"none",background:isDone?"rgba(34,197,94,.15)":"rgba(249,115,22,.15)",color:isDone?"#4ade80":"#fb923c"},onClick:function(){fbUpdTask(t.id,{status:isDone?"in_progress":"done"})}},isDone?"✅":"🔧");
    }
    tp.appendChild(statusBtn);
  }
  cd.appendChild(tp);
  if(t.v)cd.appendChild(plate(t.v.plate||""));
  if(t.description)cd.appendChild(h("div",{s:{fontSize:"13px",color:"#cbd5e1",lineHeight:"1.5",marginTop:"4px"}},t.description));

  // ═══ FREON TASK SPECIAL PANEL ═══
  if(t.freonTask&&t.type==="repair"){
    if(isDone){
      // Completed freon task — show amount and return button
      var doneRow=h("div",{s:{marginTop:"6px",padding:"8px 10px",background:"rgba(34,197,94,.06)",borderRadius:"8px",border:"1px solid rgba(34,197,94,.12)"}});
      if(t.freonKg)doneRow.appendChild(h("div",{s:{fontSize:"13px",fontWeight:"600",color:"#22d3ee",marginBottom:"6px"}},"🧊 Заправлено: "+t.freonKg+" кг"));
      doneRow.appendChild(h("button",{s:{padding:"6px 12px",borderRadius:"6px",border:"1px solid rgba(249,115,22,.3)",background:"rgba(249,115,22,.08)",color:"#fb923c",fontSize:"11px",fontWeight:"600",cursor:"pointer"},onClick:function(){
        toggleTask(t.cid,t.rid,t.id,true); // isDone=true → set back to in_progress
      }},"↩ Вернуть в работу"));
      cd.appendChild(doneRow);
    }else{
      // Active freon task — expandable panel
      var frPanel=h("div",{s:{marginTop:"6px",padding:"10px",background:"rgba(6,182,212,.06)",borderRadius:"10px",border:"1px solid rgba(6,182,212,.15)"}});
      frPanel.appendChild(h("div",{s:{fontSize:"12px",fontWeight:"600",color:"#22d3ee",marginBottom:"8px"}},"🧊 Укажите количество фреона:"));

      var frInput=h("input",{cls:"fi",type:"number",placeholder:"0",value:t.freonKg||"",step:"0.1",s:{width:"100px",padding:"8px 10px",fontSize:"15px",fontWeight:"700",textAlign:"center"}});
      frRow.appendChild(frInput);
      frRow.appendChild(h("span",{s:{fontSize:"13px",color:"#94a3b8",fontWeight:"600"}},"кг"));

      btnRow.appendChild(h("button",{s:{padding:"8px 14px",borderRadius:"8px",border:"1px solid rgba(6,182,212,.3)",background:"rgba(6,182,212,.1)",color:"#22d3ee",fontSize:"12px",fontWeight:"600",cursor:"pointer",flex:"1"},onClick:function(){

        var kg=frInput.value;
        var cl=S.cl.find(function(c){return c.id===t.cid});if(!cl)return;
        var rp=(cl.repairs||[]).slice();var ri=rp.findIndex(function(r){return r.id===t.rid});if(ri<0)return;
        var ts=(rp[ri].tasks||[]).slice();var ti=ts.findIndex(function(x){return x.id===t.id});if(ti<0)return;
        ts[ti]=Object.assign({},ts[ti],{freonKg:kg,status:"done"});
        rp[ri]=Object.assign({},rp[ri],{tasks:ts,freonAmount:kg});
        fbArr(t.cid,"repairs",rp);
      }},"✅ Выполнено"));
      frPanel.appendChild(btnRow);
      cd.appendChild(frPanel);
    }
  }

  // Regular done tasks — return button
  if(isDone&&!t.freonTask&&t.type==="repair"){
    cd.appendChild(h("button",{s:{padding:"4px 10px",borderRadius:"6px",border:"1px solid rgba(249,115,22,.2)",background:"rgba(249,115,22,.05)",color:"#fb923c",fontSize:"10px",cursor:"pointer",marginTop:"4px"},onClick:function(){toggleTask(t.cid,t.rid,t.id,true)}},"↩ Вернуть"));
  }

  if(t.rd)cd.appendChild(h("div",{s:{fontSize:"12px",color:"#64748b",marginTop:"4px"}},fD(t.rd)));
  // Show work comment if exists
  if(t.workComment){
    cd.appendChild(h("div",{s:{fontSize:"12px",color:"#e2e8f0",marginTop:"6px",padding:"6px 10px",background:"rgba(139,92,246,.06)",borderRadius:"8px",border:"1px solid rgba(139,92,246,.12)",lineHeight:"1.5"}},
      h("span",{s:{fontSize:"10px",color:"#a78bfa",fontWeight:"600"}},"📝 Отчёт: "),t.workComment));
  }
  if(t.photos&&t.photos.length)cd.appendChild(photoGrid(t.photos,false));
  // Add photo and description buttons for active tasks
  if(!isDone){
    var actRow=h("div",{s:{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"4px",alignItems:"flex-start"}});
    actRow.appendChild(inlineAddPhotoBtn("Фото",function(results){
      var newPhotos=(t.photos||[]).slice();
      results.forEach(function(data){newPhotos.push({id:gid(),data:data})});

// ═══ NOTIFICATION SOUND ═══
var lastTaskCount=-1;
function checkNotifications(){
  if(!S.u)return;
  var uid=S.u.uid;
  var count=0;
  S.cl.forEach(function(c){(c.repairs||[]).forEach(function(r){(r.tasks||[]).forEach(function(t){if(isMyTask(t)&&tSt(t)!=="done")count++})})});
  S.tasks.forEach(function(t){if(isMyTask(t)&&tSt(t)!=="done")count++});
  if(lastTaskCount>=0&&count>lastTaskCount){
    playNotifSound();
  }
  lastTaskCount=count;
}
function playNotifSound(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator();var g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.setValueAtTime(880,ac.currentTime);
    o.frequency.setValueAtTime(1100,ac.currentTime+0.1);
    o.frequency.setValueAtTime(880,ac.currentTime+0.2);
    g.gain.setValueAtTime(0.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);
    o.start(ac.currentTime);o.stop(ac.currentTime+0.4);
  }catch(e){}
}
