function makeMicBtn(textarea){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  var btn=h("button",{s:{padding:"8px 14px",borderRadius:"8px",border:"1px solid rgba(239,68,68,.25)",background:"rgba(239,68,68,.05)",color:"#f87171",fontSize:"12px",fontWeight:"600",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:"4px",marginTop:"6px",transition:"all .2s"}});
  btn.textContent="🎙 Голос";
  var recording=false;
  var recognition=null;
  btn.addEventListener("click",function(){
    if(recording){
      if(recognition)recognition.stop();
      return;
    }
    recognition=new SR();
    recognition.lang="ru-RU";
    recognition.continuous=false;
    recognition.interimResults=false;
    recording=true;
    btn.textContent="🔴 Говорите...";
    btn.style.borderColor="rgba(239,68,68,.6)";
    btn.style.background="rgba(239,68,68,.15)";
    btn.style.animation="notif-pulse 1s infinite";
    recognition.onresult=function(e){
      var text="";
      for(var i=0;i<e.results.length;i++){
        text+=e.results[i][0].transcript;
      }
      if(text){
        var cur=textarea.value;
        textarea.value=cur+(cur?" ":"")+text;
      }
    };
    recognition.onerror=function(){stopRec()};
    recognition.onend=function(){stopRec()};
    recognition.start();
    function stopRec(){
      recording=false;
      btn.textContent="🎙 Голос";
      btn.style.borderColor="rgba(239,68,68,.25)";
      btn.style.background="rgba(239,68,68,.05)";
      btn.style.animation="none";
      recognition=null;
    }
  });
  return btn;
}

function buildTaskCard(t){
  var cd=h("div",{cls:"rc"});
  var tp=h("div",{s:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
  var left=h("div",null);
  if(t.cn)left.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9",cursor:"pointer"},onClick:function(){if(t.cid){S.sel=t.cid;R()}}},t.cn));
  if(t.title)left.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9"}},t.title));
  var typeBadge=t.type==="project"?badge("📐 Проект","245,158,11"):t.type==="task"?badge("📝 Задача","99,102,241"):null;
  if(typeBadge)left.appendChild(typeBadge);
  tp.appendChild(left);
  var isDone=t.status==="done";

  // Status button — freon tasks have different behavior
  if(t.freonTask&&t.type==="repair"){
    // Freon task: show status badge, no instant toggle
    var frBadge=h("span",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",background:isDone?"rgba(34,197,94,.15)":"rgba(6,182,212,.15)",color:isDone?"#4ade80":"#22d3ee"}},isDone?"✅ Готово":"🧊 Фреон");
    tp.appendChild(frBadge);
  }else{
    // Regular tasks: toggle on click
    var statusBtn;
    if(t.type==="repair"){
      statusBtn=h("button",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"none",background:isDone?"rgba(34,197,94,.15)":"rgba(249,115,22,.15)",color:isDone?"#4ade80":"#fb923c"},onClick:function(){toggleTask(t.cid,t.rid,t.id,isDone)}},isDone?"✅":"🔧");
    }else{
      statusBtn=h("button",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"none",background:isDone?"rgba(34,197,94,.15)":"rgba(249,115,22,.15)",color:isDone?"#4ade80":"#fb923c"},onClick:function(){fbUpdTask(t.id,{status:isDone?"in_progress":"done"})}},isDone?"✅":"🔧");
    }
    tp.appendChild(statusBtn);
  }
  cd.appendChild(tp);
  if(t.v)cd.appendChild(plate(t.v.plate||""));
  if(t.description)cd.appendChild(h("div",{s:{fontSize:"13px",color:"#cbd5e1",lineHeight:"1.5",marginTop:"4px"}},t.description));

  // ═══ FREON TASK SPECIAL PANEL ═══
  if(t.freonTask&&t.type==="repair"){

// ═══ NOTIFICATION SOUND ═══
var lastTaskCount=-1;
function checkNotifications(){
  if(!S.u)return;
  var uid=S.u.uid;
  var count=0;
  S.cl.forEach(function(c){(c.repairs||[]).forEach(function(r){(r.tasks||[]).forEach(function(t){if(t.assignee===uid&&t.status!=="done")count++})})});
  S.tasks.forEach(function(t){if(t.assignee===uid&&t.status!=="done")count++});
  if(lastTaskCount>=0&&count>lastTaskCount){
    playNotifSound();
  }
  lastTaskCount=count;
}
function playNotifSound(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator();var g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.setValueAtTime(880,ac.currentTime);
    o.frequency.setValueAtTime(1100,ac.currentTime+0.1);
    o.frequency.setValueAtTime(880,ac.currentTime+0.2);
    g.gain.setValueAtTime(0.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);
    o.start(ac.currentTime);o.stop(ac.currentTime+0.4);
  }catch(e){}
}
