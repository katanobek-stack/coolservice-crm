function compress(file,mw,q){
  mw=mw||500; q=q||0.4;
  return new Promise(function(resolve){
    var fr=new FileReader();
    fr.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement("canvas");
        var w=img.width, ht=img.height;
        if(w>mw){ht=ht*(mw/w);w=mw}
        c.width=w;c.height=ht;
        c.getContext("2d").drawImage(img,0,0,w,ht);
        resolve(c.toDataURL("image/jpeg",q));
      };
      img.src=e.target.result;
    };
    fr.readAsDataURL(file);
  });
}

// ═══ DOM ═══
function h(tag,attrs){
  var el=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(k==="cls")el.className=v;
      else if(k==="s"&&typeof v==="object")Object.assign(el.style,v);
      else if(k==="value")el.value=v;
      else if(k.substring(0,2)==="on")el.addEventListener(k.substring(2).toLowerCase(),v);
      else el.setAttribute(k,v);
    });
  }
  children.forEach(function(c){
    if(Array.isArray(c))c.forEach(add);
    else add(c);
  });
  function add(c){if(c!=null&&c!==false)el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)}
  return el;
}

function buildTaskCard(t){
  var cd=h("div",{cls:"rc"});
  var tp=h("div",{s:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
  tp.appendChild(h("div",{s:{fontSize:"14px",fontWeight:"600",color:"#f1f5f9",cursor:"pointer"},onClick:function(){S.sel=t.cid;R()}},t.cn||""));
  var isDone=t.status==="done";
  tp.appendChild(h("button",{s:{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"none",background:isDone?"rgba(34,197,94,.15)":"rgba(249,115,22,.15)",color:isDone?"#4ade80":"#fb923c"},onClick:function(){toggleTask(t.cid,t.rid,t.id,isDone)}},isDone?"✅ Готово":"🔧 В работе"));
  cd.appendChild(tp);
  if(t.v)cd.appendChild(plate(t.v.plate||""));
  if(t.description)cd.appendChild(h("div",{s:{fontSize:"13px",color:"#cbd5e1",lineHeight:"1.5",marginTop:"4px"}},t.description));
  if(t.rd)cd.appendChild(h("div",{s:{fontSize:"12px",color:"#64748b",marginTop:"4px"}},fD(t.rd)));
  if(t.photos&&t.photos.length){cd.appendChild(photoGrid(t.photos,false))}
  // Add photo button for active tasks
  if(!isDone){
    var fileIn=h("input",{type:"file",accept:"image/*",multiple:true,s:{display:"none"}});
    fileIn.addEventListener("change",function(e){
      var files=Array.from(e.target.files);
      if(!files.length)return;
      Promise.all(files.map(function(f){return compress(f)})).then(function(results){
        addPhotosToTask(t.cid,t.rid,t.id,results);
        e.target.value="";
      });
    });
    var photoBtn=h("button",{s:{padding:"6px 12px",borderRadius:"8px",border:"1px solid rgba(56,189,248,.2)",background:"rgba(56,189,248,.05)",color:"#38bdf8",fontSize:"11px",fontWeight:"600",cursor:"pointer",marginTop:"8px",display:"inline-flex",alignItems:"center",gap:"4px"},onClick:function(){fileIn.click()}},"📷 Добавить фото");
    cd.appendChild(photoBtn);
    cd.appendChild(fileIn);
  }
  return cd;
}

function addPhotosToTask(cid,rid,tid,photoDataArray){
  var cl=S.cl.find(function(c){return c.id===cid});
  if(!cl)return;
  var rp=(cl.repairs||[]).slice();
  var ri=rp.findIndex(function(r){return r.id===rid});
  if(ri<0)return;
  var ts=(rp[ri].tasks||[]).slice();
  var ti=ts.findIndex(function(x){return x.id===tid});
  if(ti<0)return;
  var existingPhotos=(ts[ti].photos||[]).slice();
  photoDataArray.forEach(function(data){
    existingPhotos.push({id:gid(),data:data});
  });
  ts[ti]=Object.assign({},ts[ti],{photos:existingPhotos});
  rp[ri]=Object.assign({},rp[ri],{tasks:ts});
  fbArr(cid,"repairs",rp).catch(function(err){alert("Ошибка: "+err.message)});
}

function toggleTask(cid,rid,tid,isDone){
  var cl=S.cl.find(function(c){return c.id===cid});
  if(!cl)return;
  var rp=(cl.repairs||[]).slice();
  var ri=rp.findIndex(function(r){return r.id===rid});
  if(ri<0)return;
  var ts=(rp[ri].tasks||[]).slice();
  var ti=ts.findIndex(function(x){return x.id===tid});
  if(ti<0)return;
  ts[ti]=Object.assign({},ts[ti],{status:isDone?"in_progress":"done"});
  rp[ri]=Object.assign({},rp[ri],{tasks:ts});
  fbArr(cid,"repairs",rp);
}

#rsbot-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
#rsbot-msgs::-webkit-scrollbar{width:4px}#rsbot-msgs::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
.rsbot-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-wrap:break-word;animation:rsbot-fade .3s ease}
.rsbot-msg.bot{background:rgba(56,189,248,.1);color:#e2e8f0;border:1px solid rgba(56,189,248,.1);align-self:flex-start;border-bottom-left-radius:4px}
.rsbot-msg.user{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.rsbot-msg.system{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.15);align-self:center;text-align:center;font-size:12px;font-weight:600}
.rsbot-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.rsbot-typing span{width:8px;height:8px;border-radius:50%;background:rgba(56,189,248,.4);animation:rsbot-dot 1.2s infinite}
.rsbot-typing span:nth-child(2){animation-delay:.2s}
.rsbot-typing span:nth-child(3){animation-delay:.4s}
@keyframes rsbot-dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@keyframes rsbot-fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#rsbot-input-row{padding:10px 14px;border-top:1px solid rgba(56,189,248,.1);display:flex;gap:8px;background:#0a1628}
#rsbot-input{flex:1;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:80px}
#rsbot-input:focus{border-color:#0ea5e9}
#rsbot-input::placeholder{color:#475569}
#rsbot-send{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#rsbot-send:disabled{opacity:.4;cursor:not-allowed}
`;
document.head.appendChild(style);

// Create toggle button
var toggle=document.createElement("button");
toggle.id="rsbot-toggle";
toggle.innerHTML="❄️";
toggle.onclick=function(){
  chatOpen=!chatOpen;
  toggle.className=chatOpen?"open":"";
  toggle.innerHTML=chatOpen?"✕":"❄️";
  box.className=chatOpen?"open":"";
  if(chatOpen&&!messages.length)startChat();
};
document.body.appendChild(toggle);

// Create chat box
var box=document.createElement("div");
box.id="rsbot-box";
box.innerHTML=`
<div id="rsbot-hdr">
  <div id="rsbot-hdr-icon">❄️</div>
  <div>
    <div id="rsbot-hdr-text">РефСервисДВ</div>
    <div id="rsbot-hdr-sub">ИИ-ассистент · Запись на ремонт</div>
  </div>
</div>
<div id="rsbot-msgs"></div>
<div id="rsbot-input-row">
  <textarea id="rsbot-input" placeholder="Напишите сообщение..." rows="1"></textarea>
  <button id="rsbot-send">➤</button>
</div>`;
document.body.appendChild(box);

var msgsEl=document.getElementById("rsbot-msgs");
var inputEl=document.getElementById("rsbot-input");
var sendBtn=document.getElementById("rsbot-send");

inputEl.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}
});
sendBtn.onclick=sendMessage;
inputEl.addEventListener("input",function(){
  inputEl.style.height="40px";
  inputEl.style.height=Math.min(inputEl.scrollHeight,80)+"px";
});

function addMsg(text,cls){
  var div=document.createElement("div");
  div.className="rsbot-msg "+cls;
  div.textContent=text;
  msgsEl.appendChild(div);
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

function showTyping(){
  var div=document.createElement("div");
  div.className="rsbot-typing";
  div.id="rsbot-typing";
  div.innerHTML="<span></span><span></span><span></span>";
  msgsEl.appendChild(div);
  msgsEl.scrollTop=msgsEl.scrollHeight;
}
function hideTyping(){
  var el=document.getElementById("rsbot-typing");
  if(el)el.remove();
}

function startChat(){
  messages=[];
  loading=true;
  showTyping();
  callAI([{role:"user",content:"Привет"}]).then(function(reply){
    hideTyping();
    loading=false;
    messages.push({role:"user",content:"Привет"});
    messages.push({role:"assistant",content:reply});
    addMsg(reply,"bot");
  }).catch(function(err){
    hideTyping();
    loading=false;
    addMsg("Не удалось подключиться. Попробуйте позже.","bot");
  });
}

function sendMessage(){
  if(loading||booked)return;
  var text=inputEl.value.trim();
  if(!text)return;
  inputEl.value="";
  inputEl.style.height="40px";
  addMsg(text,"user");
  messages.push({role:"user",content:text});
  loading=true;
  sendBtn.disabled=true;
  showTyping();

  callAI(messages).then(function(reply){
    hideTyping();
    loading=false;
    sendBtn.disabled=false;
    messages.push({role:"assistant",content:reply});

    // Check for booking data
    var bookingMatch=reply.match(/<BOOKING_DATA>([\s\S]*?)<\/BOOKING_DATA>/);
    if(bookingMatch){
      var cleanReply=reply.replace(/<BOOKING_DATA>[\s\S]*?<\/BOOKING_DATA>/,"").trim();
      if(cleanReply)addMsg(cleanReply,"bot");
      try{
        var data=JSON.parse(bookingMatch[1].trim());
        saveBooking(data);
      }catch(e){
        addMsg("Ошибка обработки данных. Попробуйте ещё раз.","bot");
      }
    }else{
      addMsg(reply,"bot");
    }
  }).catch(function(err){
    hideTyping();
    loading=false;
    sendBtn.disabled=false;
    addMsg("Ошибка соединения. Попробуйте ещё раз.","bot");
  });
}

function callAI(msgs){
  return fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:SYSTEM_PROMPT,messages:msgs})
  }).then(function(r){return r.json()}).then(function(data){
    if(data.content&&data.content[0]&&data.content[0].text){
      return data.content[0].text;
    }
    throw new Error(data.error||"No response");
  });
}

function saveBooking(data){
  var svcMap={refrigerator:"refrigerator",ac:"ac",freezer:"freezer",other:"other"};
  var serviceType=svcMap[data.serviceType]||"other";
  var dateTime=data.date+"T"+(data.time||"09:00");

  addDoc(collection(db,"clients"),{
    name:data.name||"Новый клиент",
    phone:data.phone||"",
    vehicles:[{
      id:"v"+Date.now().toString(36),
      plate:(data.plate||"").toUpperCase(),
      brand:data.brand||"",
      serviceType:serviceType,
      notes:"",
      photo:null
    }],
    repairs:[],
    appointments:[{
      id:"a"+Date.now().toString(36),
      vehicleId:"v"+Date.now().toString(36),
      date:dateTime,
      serviceType:serviceType,
      description:"🤖 Онлайн-запись: "+(data.problem||"Диагностика")
    }],
    createdAt:serverTimestamp(),
    source:"website-bot"
  }).then(function(){
    booked=true;
    addMsg("✅ Запись успешно создана! Ждём вас в РефСервисДВ.","system");
    inputEl.placeholder="Запись создана. Спасибо!";
    inputEl.disabled=true;
    sendBtn.disabled=true;
  }).catch(function(err){
    addMsg("Не удалось сохранить запись. Позвоните нам напрямую.","bot");
    console.error("Firebase error:",err);
  });
}
</script>
